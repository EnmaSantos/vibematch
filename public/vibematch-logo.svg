<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title>VibeMatch logo</title>
  <desc>Two movie swipe cards crossing over a heart-shaped play mark.</desc>
  <defs>
    <linearGradient id="vm-bg" x1="8" y1="6" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#151D2B" />
      <stop offset="0.52" stop-color="#0C111A" />
      <stop offset="1" stop-color="#090B11" />
    </linearGradient>
    <linearGradient id="vm-gold" x1="14" y1="12" x2="47" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD98A" />
      <stop offset="1" stop-color="#F0B44C" />
    </linearGradient>
    <linearGradient id="vm-accent" x1="21" y1="43" x2="48" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4A7" />
      <stop offset="1" stop-color="#F17C67" />
    </linearGradient>
    <filter id="vm-shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#vm-bg)" />
  <path d="M13 23.5 20.5 12 29 19" fill="none" stroke="#F0B44C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
  <path d="M51 40.5 43.5 52 35 45" fill="none" stroke="#2DD4A7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
  <g filter="url(#vm-shadow)">
    <rect x="15" y="14" width="24" height="35" rx="6" transform="rotate(-12 27 31.5)" fill="#101722" stroke="url(#vm-gold)" stroke-width="3" />
    <rect x="25" y="15" width="24" height="35" rx="6" transform="rotate(10 37 32.5)" fill="#151D2B" stroke="#2DD4A7" stroke-width="3" />
    <path d="M32 43.5 24.7 36.9c-3.6-3.3-3.8-8.5-.5-11.4 2.4-2.1 5.8-1.8 7.8.7 2-2.5 5.4-2.8 7.8-.7 3.3 2.9 3.1 8.1-.5 11.4L32 43.5Z" fill="url(#vm-accent)" />
    <path d="M31 29 38.5 32.5 31 36V29Z" fill="#090B11" />
  </g>
  <circle cx="20" cy="21" r="2" fill="#FFD98A" />
  <circle cx="45" cy="45" r="2" fill="#F17C67" />
</svg>
